<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background: rounded square, deep forest green -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#2D3D2E"/>
  <!-- Icon: Crop rows — three curved horizontal lines with seedling marks -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Bottom row (widest) -->
    <path d="M52 130 Q100 118 148 130"/>
    <!-- Middle row -->
    <path d="M58 104 Q100 92 142 104"/>
    <!-- Top row (narrowest) -->
    <path d="M64 78 Q100 66 136 78"/>
    <!-- Seedling marks rising from middle line -->
    <line x1="88" y1="98" x2="88" y2="86"/>
    <line x1="100" y1="95" x2="100" y2="82"/>
    <line x1="112" y1="98" x2="112" y2="86"/>
    <!-- Small leaf hints on center seedling -->
    <path d="M100 88 Q104 84 100 80"/>
    <path d="M100 88 Q96 84 100 80"/>
  </g>
</svg>
