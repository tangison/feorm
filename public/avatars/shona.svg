<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background: rounded square, deep earth brown -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#4A3728"/>
  <!-- Icon: Welwitschia plant — two broad leaves from central disc -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Central woody disc -->
    <ellipse cx="100" cy="90" rx="10" ry="8" fill="white" stroke="white" stroke-width="1.5"/>
    <!-- Left leaf — broad strap curling outward and down -->
    <path d="M90 92 Q70 100 48 120 Q40 130 50 136 Q60 140 72 128 Q82 118 88 98"/>
    <!-- Right leaf — broad strap curling outward and down -->
    <path d="M110 92 Q130 100 152 120 Q160 130 150 136 Q140 140 128 128 Q118 118 112 98"/>
  </g>
</svg>
