<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background: rounded square, dark bark brown -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#5C4A1E"/>
  <!-- Icon: Simplified compass rose -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- North point (elongated) -->
    <path d="M100 52 L108 88 L100 80 L92 88 Z"/>
    <!-- South point (elongated) -->
    <path d="M100 148 L92 112 L100 120 L108 112 Z"/>
    <!-- East point (shorter) -->
    <path d="M148 100 L112 92 L120 100 L112 108 Z"/>
    <!-- West point (shorter) -->
    <path d="M52 100 L88 108 L80 100 L88 92 Z"/>
    <!-- Center circle -->
    <circle cx="100" cy="100" r="6" fill="white" stroke="white" stroke-width="1"/>
  </g>
</svg>
