  <circle cx="72" cy="52" r="8" fill="#1E1A14"/>
  <circle cx="86" cy="44" r="9" fill="#1E1A14"/>
  <circle cx="100" cy="40" r="9" fill="#1E1A14"/>
  <circle cx="114" cy="44" r="9" fill="#1E1A14"/>
  <circle cx="128" cy="52" r="8" fill="#1E1A14"/>
