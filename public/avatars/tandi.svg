  <path d="M90 109 Q100 115 110 109" fill="#C4735A" opacity="0.5"/>
  <!-- Cheeks -->
  <ellipse cx="74" cy="103" rx="6" ry="3.5" fill="#E8A08A" opacity="0.3"/>
  <ellipse cx="126" cy="103" rx="6" ry="3.5" fill="#E8A08A" opacity="0.3"/>
