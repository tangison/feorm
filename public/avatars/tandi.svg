<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background: rounded square, amber gold -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#8B6914"/>
  <!-- Icon: Three concentric arcs open at bottom (gathering/amphitheatre) -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer arc -->
    <path d="M48 120 A60 60 0 0 1 152 120"/>
    <!-- Middle arc -->
    <path d="M60 112 A48 48 0 0 1 140 112"/>
    <!-- Inner arc -->
    <path d="M72 104 A36 36 0 0 1 128 104"/>
    <!-- Focal point at bottom center -->
    <circle cx="100" cy="138" r="4" fill="white" stroke="none"/>
  </g>
</svg>
