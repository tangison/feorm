  <circle cx="128" cy="52" r="3" fill="none" stroke="#E8C96A" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="84" cy="90" rx="5" ry="5.5" fill="#1E1A14"/>
  <ellipse cx="116" cy="90" rx="5" ry="5.5" fill="#1E1A14"/>
  <ellipse cx="86" cy="88" rx="2" ry="2.2" fill="#FEFDFB"/>
  <ellipse cx="118" cy="88" rx="2" ry="2.2" fill="#FEFDFB"/>
  <!-- Eyelashes -->
  <path d="M78 86 L76 83" stroke="#1E1A14" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M80 85 L79 82" stroke="#1E1A14" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M120 85 L121 82" stroke="#1E1A14" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M122 86 L124 83" stroke="#1E1A14" stroke-width="1.2" stroke-linecap="round"/>
