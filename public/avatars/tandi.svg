  <ellipse cx="100" cy="38" rx="5" ry="6" fill="#3C2F1A"/>
  <ellipse cx="114" cy="42" rx="5" ry="6" fill="#3C2F1A"/>
  <ellipse cx="128" cy="50" rx="5" ry="6" fill="#3C2F1A"/>
