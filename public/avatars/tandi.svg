  <path d="M75 82 Q84 76 93 81" stroke="#1E1A14" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M107 81 Q116 76 125 82" stroke="#1E1A14" stroke-width="1.8" stroke-linecap="round" fill="none"/>
