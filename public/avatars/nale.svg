<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background: rounded square, sage olive green -->
  <rect x="0" y="0" width="200" height="200" rx="32" fill="#6B7C3A"/>
  <!-- Icon: Mountain silhouette with path -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Mountain horizon line with two kopje peaks -->
    <path d="M44 128 L72 96 L88 112 L108 80 L128 108 L144 92 L160 128"/>
    <!-- Path/trail cutting diagonally across -->
    <line x1="56" y1="140" x2="120" y2="84"/>
  </g>
</svg>
